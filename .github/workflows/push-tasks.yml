name: Pousser tâches assignées

on:
  push:
    paths:
      - 'tasks.json'

jobs:
  push-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @octokit/rest
      - name: Pousser tâches vers autres dépôts
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: node push-tasks.js
